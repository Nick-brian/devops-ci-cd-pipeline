name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/devops-ci-cd-pipeline
            git pull origin main
            docker build -t app .
            docker stop app || true
            docker rm app || true
            docker run -d -p 5000:5000 --name app app
